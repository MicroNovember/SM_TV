<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">SM Live TV Player</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e5e7eb;
        }
        .player-container {
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(251, 146, 60, 0.1);
        }
        .tv-frame {
            background: #000;
            border: 6px solid #374151;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            max-width: 85%;
            margin: 0 auto;
            transition: border-color 0.3s ease;
        }
        .tv-frame:hover {
            border-color: rgba(251, 146, 60, 0.5);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }
        .channel-info {
            background: linear-gradient(135deg, #fb923c 0%, #ea580c 100%);
        }
        .control-btn {
            transition: all 0.25s ease;
        }
        .control-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 12px rgba(251, 146, 60, 0.25);
        }
        @media (max-width: 768px) {
            .tv-frame {
                max-width: 98%;
                border-width: 3px;
            }
        }
    </style>
</head>
<body class="font-sans">
    <!-- Header -->
    <header class="bg-gray-900 bg-opacity-90 text-white shadow-lg border-b border-orange-900/30">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <a href="index.html" class="flex items-center space-x-3 hover:text-orange-300 transition">
                        <i class="fas fa-arrow-left text-xl"></i>
                        <i class="fas fa-tv text-2xl text-orange-400"></i>
                        <h1 class="text-xl font-bold">Live TV Player</h1>
                    </a>
                </div>
                <div class="flex items-center space-x-2">
                    <button onclick="toggleFullscreen()" class="control-btn bg-orange-600 hover:bg-orange-500 px-3 py-2 rounded-lg">
                        <i class="fas fa-expand"></i>
                    </button>
                    <button onclick="refreshPlayer()" class="control-btn bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded-lg">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Player Section -->
    <main class="container mx-auto px-4 py-6">
        <div class="player-container rounded-2xl shadow-2xl overflow-hidden">
            
            <!-- Channel Info -->
            <div class="channel-info text-white p-6">
                <div class="flex items-center justify-between flex-wrap gap-4">
                    <div>
                        <h1 id="channelName" class="text-3xl font-bold mb-2 flex items-center">
                            <i class="fas fa-tv mr-3"></i>
                            กำลังโหลด...
                        </h1>
                        <p class="text-orange-100">
                            <i class="fas fa-broadcast-tower mr-2"></i>
                            กำลังออกอากาศสด • คุณภาพ HD
                        </p>
                    </div>
                    <div class="text-right">
                        <div class="bg-red-600 px-3 py-1 rounded-full text-sm font-semibold animate-pulse">
                            <i class="fas fa-circle mr-2"></i>LIVE
                        </div>
                        <p id="channelId" class="text-sm mt-2 text-orange-100">ID: กำลังโหลด...</p>
                    </div>
                </div>
            </div>

            <!-- Video Player -->
            <div class="p-4 md:p-6">
                <div class="tv-frame">
                    <div class="relative" style="padding-bottom: 56.25%;">
                        <iframe 
                            id="playerFrame"
                            src=""
                            allowfullscreen
                            allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
                            sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation"
                            class="absolute top-0 left-0 w-full h-full"
                        ></iframe>
                    </div>
                </div>
            </div>

         
                
            </div>
        </div>

        <!-- Back Button -->
        <div class="text-center mt-8">
            <a href="index.html" class="inline-flex items-center bg-orange-600 hover:bg-orange-500 text-white px-6 py-3 rounded-lg transition">
                <i class="fas fa-arrow-left mr-2"></i>
                กลับไปหน้ารายการช่อง
            </a>
        </div>
    </main>

    <script>
        let channelId = null;
        let channel = null;
        let isMuted = false;

        // ดึง ID จาก URL
        function getChannelId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // โหลดข้อมูลช่อง
        async function loadChannel() {
            channelId = getChannelId();
            if (!channelId) {
                document.getElementById('channelName').textContent = 'ไม่พบรหัสช่อง';
                return;
            }

            try {
                const res = await fetch('static/data/channels.json');
                const channels = await res.json();
                channel = channels.find(c => String(c.id) === String(channelId));
                
                if (channel) {
                    document.getElementById('channelName').innerHTML = `<i class="fas fa-tv mr-3 text-orange-400"></i>${channel.name}`;
                    document.getElementById('channelId').textContent = `ID: ${channel.id}`;
                    document.getElementById('pageTitle').textContent = `${channel.name} - ดูทีวีออนไลน์`;
                    loadPlayer();
                } else {
                    document.getElementById('channelName').textContent = 'ไม่พบข้อมูลช่องนี้';
                }
            } catch (err) {
                console.error('โหลดข้อมูลล้มเหลว:', err);
                document.getElementById('channelName').textContent = 'เกิดข้อผิดพลาดในการโหลด';
            }
        }

        // โหลดเครื่องเล่น
        function loadPlayer() {
            if (!channel) return;
            document.getElementById('playerFrame').src = `https://dlhd.pk/watch/stream-${channel.id}.php`;
        }

        // เปลี่ยนแหล่งสัญญาณ
        function changeSource(type) {
            if (!channel) return;
            const srcMap = {
                watch: `https://dlhd.pk/watch/stream-${channel.id}.php`,
                cast: `https://dlhd.pk/cast/stream-${channel.id}.php`,
                plus: `https://dlhd.pk/plus/stream-${channel.id}.php`,
                stream: `https://dlhd.pk/stream/stream-${channel.id}.php`,
                casting: `https://dlhd.pk/casting/stream-${channel.id}.php`
            };
            document.getElementById('playerFrame').src = srcMap[type];
        }

        // เต็มจอ
        function toggleFullscreen() {
            const container = document.querySelector('.tv-frame');
            if (!document.fullscreenElement) {
                container.requestFullscreen?.() || container.webkitRequestFullscreen?.();
            } else {
                document.exitFullscreen?.() || document.webkitExitFullscreen?.();
            }
        }

        // รีเฟรช
        function refreshPlayer() {
            const frame = document.getElementById('playerFrame');
            const tmp = frame.src;
            frame.src = '';
            setTimeout(() => frame.src = tmp, 80);
        }

        function changeQuality() {
            refreshPlayer();
            alert('เปลี่ยนคุณภาพแล้ว กำลังโหลดใหม่...');
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteIcon').className = isMuted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
        }

        function shareChannel() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: channel?.name || 'ทีวีออนไลน์', url });
            } else {
                navigator.clipboard.writeText(url);
                alert('คัดลอกลิงก์เรียบร้อยแล้ว');
            }
        }

        function openDirect() {
            if (channel) window.open(`https://dlhd.pk/watch.php?id=${channel.id}`, '_blank');
        }

        document.addEventListener('DOMContentLoaded', loadChannel);

        // คีย์ลัด
        document.addEventListener('keydown', e => {
            if (['f','F'].includes(e.key)) toggleFullscreen();
            if (['r','R'].includes(e.key)) refreshPlayer();
            if (['m','M'].includes(e.key)) toggleMute();
        });
    </script>
</body>
</html>

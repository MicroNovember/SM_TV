<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">SM-Clean Player<Clean Player</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e5e7eb;
        }
        .player-container {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.1);
        }
        .tv-frame {
            background: #000;
            border: 6px solid #1e3a8a;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.2);
            max-width: 85%;
            margin: 0 auto;
            transition: border-color 0.3s ease;
        }
        .tv-frame:hover {
            border-color: rgba(59, 130, 246, 0.5);
        }
        
        @media (max-width: 1024px) {
            .tv-frame {
                max-width: 90%;
            }
        }
        
        @media (max-width: 768px) {
            .tv-frame {
                max-width: 98%;
                border: 3px solid #1e3a8a;
            }
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }
        .source-btn {
            transition: all 0.3s ease;
        }
        .source-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .loading {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="font-sans">
    <!-- Header -->
    <header class="bg-gray-900 bg-opacity-90 text-white shadow-lg border-b border-blue-900/30">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <a href="index.html" class="flex items-center space-x-3 hover:text-blue-400 transition">
                        <i class="fas fa-arrow-left text-xl"></i>
                        <i class="fas fa-tv text-2xl text-blue-400"></i>
                        <h1 class="text-xl font-bold">Player 2</h1>
                    </a>
                </div>
                <div class="flex items-center space-x-2">
                    <span id="channelStatus" class="bg-blue-900/60 text-blue-200 px-3 py-1 rounded-full text-sm">
                        <i class="fas fa-circle mr-2 animate-pulse"></i>กำลังโหลด...
                    </span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-6">
        <div class="player-container rounded-2xl shadow-2xl overflow-hidden">
            
            <!-- Player Area -->
            <div class="p-4 md:p-6">
                <div class="tv-frame">
                    <div class="relative" style="padding-bottom: 56.25%;">
                        <iframe 
                            id="playerFrame"
                            src=""
                            allowfullscreen
                            allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
                            sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
                            class="absolute top-0 left-0 w-full h-full"
                        ></iframe>
                        <div id="loadingOverlay" class="absolute top-0 left-0 w-full h-full bg-black bg-opacity-80 flex items-center justify-center">
                            <div class="text-center text-white">
                                <i class="fas fa-spinner fa-spin text-4xl mb-4 text-blue-400"></i>
                                <p class="text-lg">กำลังโหลดสตรีม...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Alternative Sources & Controls -->
            <div class="bg-gray-900 p-6 border-t border-blue-900/30">
                <h3 class="text-white font-semibold mb-3">
                    <i class="fas fa-link mr-2 text-blue-400"></i>แหล่งทางเลือก:
                </h3>
                <div class="flex flex-wrap gap-2 mb-6">
                    <button onclick="loadSource('watch')" class="source-btn bg-blue-900/50 hover:bg-blue-800 text-white px-3 py-1 rounded text-sm">Watch</button>
                    <button onclick="loadSource('cast')" class="source-btn bg-blue-900/50 hover:bg-blue-800 text-white px-3 py-1 rounded text-sm">Cast</button>
                    <button onclick="loadSource('plus')" class="source-btn bg-blue-900/50 hover:bg-blue-800 text-white px-3 py-1 rounded text-sm">Plus</button>
                    <button onclick="loadSource('stream')" class="source-btn bg-blue-900/50 hover:bg-blue-800 text-white px-3 py-1 rounded text-sm">Stream</button>
                    <button onclick="loadSource('casting')" class="source-btn bg-blue-900/50 hover:bg-blue-800 text-white px-3 py-1 rounded text-sm">Casting</button>
                </div>

                <div class="flex flex-wrap gap-2">
                    <button onclick="openDirect()" class="source-btn bg-blue-700 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
                        <i class="fas fa-external-link-alt mr-2"></i>เปิดตรง
                    </button>
                    <button onclick="copyLink()" class="source-btn bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg">
                        <i class="fas fa-copy mr-2"></i>คัดลอกลิงก์
                    </button>
                    <button onclick="refreshPlayer()" class="source-btn bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg">
                        <i class="fas fa-sync-alt mr-2"></i>รีเฟรช
                    </button>
                </div>
            </div>
        </div>

        <!-- Back Button -->
        <div class="text-center mt-8">
            <a href="index.html" class="inline-flex items-center bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-lg transition">
                <i class="fas fa-arrow-left mr-2"></i>
                กลับไปหน้ารายการช่อง
            </a>
        </div>
    </main>

    <script>
        let channelId = null;
        let channel = null;
        const baseUrl = 'https://dlhd.pk';

        // ดึง channel ID จาก URL
        function getChannelId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        // โหลดข้อมูลช่อง
        async function loadChannel() {
            channelId = getChannelId();
            if (!channelId) {
                document.getElementById('channelStatus').innerHTML = `<i class="fas fa-exclamation-triangle mr-2"></i>ไม่พบช่อง`;
                return;
            }

            try {
                const response = await fetch('static/data/channels.json');
                const channels = await response.json();
                channel = channels.find(c => String(c.id) === String(channelId));
                
                if (channel) {
                    document.getElementById('channelStatus').innerHTML = `
                        <i class="fas fa-circle mr-2 animate-pulse"></i>
                        ${channel.name}
                    `;
                    document.getElementById('pageTitle').textContent = `${channel.name} - Clean Player`;
                    
                    // โหลด source แรกอัตโนมัติ
                    setTimeout(() => {
                        loadSource('watch');
                    }, 500);
                } else {
                    document.getElementById('channelStatus').innerHTML = `<i class="fas fa-exclamation-circle mr-2"></i>ไม่พบช่องนี้`;
                }
            } catch (error) {
                console.error('Error loading channel:', error);
                document.getElementById('channelStatus').innerHTML = `<i class="fas fa-times-circle mr-2"></i>เกิดข้อผิดพลาด`;
            }
        }

        function loadSource(type) {
            if (!channel) return;
            
            const iframe = document.getElementById('playerFrame');
            const loading = document.getElementById('loadingOverlay');
            
            // แสดง loading
            loading.style.display = 'flex';
            
            // แหล่งสัญญาณ
            const sources = {
                'watch': `${baseUrl}/watch/stream-${channel.id}.php`,
                'cast': `${baseUrl}/cast/stream-${channel.id}.php`,
                'plus': `${baseUrl}/plus/stream-${channel.id}.php`,
                'stream': `${baseUrl}/stream/stream-${channel.id}.php`,
                'casting': `${baseUrl}/casting/stream-${channel.id}.php`
            };
            
            iframe.src = sources[type];
        }

        function refreshPlayer() {
            const iframe = document.getElementById('playerFrame');
            const currentSrc = iframe.src;
            iframe.src = '';
            setTimeout(() => iframe.src = currentSrc, 100);
        }

        function openDirect() {
            if (channel) {
                window.open(`${baseUrl}/watch.php?id=${channel.id}`, '_blank');
            }
        }

        function copyLink() {
            if (channel) {
                const link = `${baseUrl}/watch.php?id=${channel.id}`;
                navigator.clipboard.writeText(link).then(() => {
                    alert('คัดลอกลิงก์เรียบร้อยแล้ว');
                }).catch(() => {
                    alert('ไม่สามารถคัดลอกได้ กรุณาลองใหม่');
                });
            }
        }

        // ซ่อน loading เมื่อ iframe โหลดเสร็จ
        document.getElementById('playerFrame').addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
            }, 300);
        });

        // โหลดเมื่อเปิดหน้า
        document.addEventListener('DOMContentLoaded', loadChannel);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Clean Player</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e5e7eb;
        }
        .player-box {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(59, 130, 246, 0.15);
            backdrop-filter: blur(8px);
        }
        .video-frame {
            background: #000;
            border: none;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.15);
            max-width: 720px; /* ลดขนาดเริ่มต้น */
            margin: 0 auto;
            transition: all 0.3s ease;
        }
        .video-frame:hover {
            border-color: rgba(59, 130, 246, 0.5);
        }
        /* ปรับขนาดตามหน้าจอ */
        @media (max-width: 768px) {
            .video-frame {
                max-width: 96%;
                border-width: 3px;
            }
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 6px;
        }
        .btn {
            transition: all 0.2s ease;
        }
        .btn:hover {
            transform: translateY(-1px);
        }
        .loading {
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        /* ซ่อนสิ่งเกินไปตอนเต็มจอ */
        :-webkit-full-screen {
            background: #000;
        }
        :-ms-fullscreen {
            background: #000;
        }
        :fullscreen {
            background: #000;
        }
    </style>
</head>
<body class="font-sans">
    <!-- ส่วนหัวเรียบง่าย -->
    <header class="bg-gray-900/85 border-b border-blue-900/30">
        <div class="container mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <a href="index.html" class="flex items-center text-blue-300 hover:text-blue-200 transition">
                    <i class="fas fa-arrow-left mr-2"></i>
                    <span class="font-medium">กลับ</span>
                </a>
                <span id="channelName" class="font-semibold text-blue-300 truncate">กำลังโหลด...</span>
                <button onclick="toggleFullscreen()" class="btn bg-blue-800/60 hover:bg-blue-700 px-3 py-1 rounded text-sm">
                    <i class="fas fa-expand"></i> เต็มจอ
                </button>
            </div>
        </div>
    </header>

    <!-- พื้นที่เล่นหลัก -->
    <main class="container mx-auto px-4 py-6">
        <div class="player-box rounded-xl shadow-xl overflow-hidden">
            <div class="p-4">
                <div class="video-frame">
                    <div class="relative" style="padding-bottom: 56.25%;">
                        <iframe 
                            id="playerFrame"
                            src=""
                            allowfullscreen
                            allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
                            sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
                            class="absolute top-0 left-0 w-full h-full"
                        ></iframe>
                        <div id="loadingOverlay" class="absolute inset-0 bg-black/80 flex items-center justify-center">
                            <div class="text-center">
                                <i class="fas fa-spinner fa-spin text-3xl text-blue-400 mb-3"></i>
                                <p class="text-sm">กำลังโหลดสตรีม...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            
        </div>
    </main>

    <script>
        let channelId = null;
        let channel = null;
        const baseUrl = 'https://dlhd.pk';

        // ดึงรหัสช่อง
        function getChannelId() {
            return new URLSearchParams(window.location.search).get('id');
        }

        // โหลดข้อมูลช่อง
        async function loadChannel() {
            channelId = getChannelId();
            if (!channelId) {
                document.getElementById('channelName').textContent = 'ไม่พบช่อง';
                return;
            }

            try {
                const res = await fetch('static/data/channels.json');
                const channels = await res.json();
                channel = channels.find(c => String(c.id) === String(channelId));

                if (channel) {
                    document.getElementById('channelName').textContent = channel.name;
                    document.getElementById('pageTitle').textContent = `${channel.name} - Clean Player`;
                    setTimeout(() => loadSource('watch'), 400);
                } else {
                    document.getElementById('channelName').textContent = 'ไม่พบข้อมูลช่อง';
                }
            } catch (err) {
                document.getElementById('channelName').textContent = 'โหลดข้อมูลล้มเหลว';
            }
        }

        // เปลี่ยนแหล่งสัญญาณ
        function loadSource(type) {
            if (!channel) return;
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('playerFrame').src = `${baseUrl}/${type}/stream-${channel.id}.php`;
        }

        // รีเฟรช
        function refreshPlayer() {
            const f = document.getElementById('playerFrame');
            const tmp = f.src;
            f.src = '';
            setTimeout(() => f.src = tmp, 80);
        }

        // เต็มจอ แก้ไขให้ทำงานจริง
        function toggleFullscreen() {
            const frame = document.querySelector('.video-frame');
            if (!document.fullscreenElement) {
                frame.requestFullscreen?.() || frame.webkitRequestFullscreen?.() || frame.msRequestFullscreen?.();
            } else {
                document.exitFullscreen?.() || document.webkitExitFullscreen?.() || document.msExitFullscreen?.();
            }
        }

        // เปิดลิงก์ตรง
        function openDirect() {
            channel && window.open(`${baseUrl}/watch.php?id=${channel.id}`, '_blank');
        }

        // คัดลอกลิงก์
        function copyLink() {
            if (!channel) return;
            const link = `${baseUrl}/watch.php?id=${channel.id}`;
            navigator.clipboard.writeText(link).then(() => alert('คัดลอกแล้ว'));
        }

        // ซ่อนหน้าโหลดเมื่อวิดีโอเปิด
        document.getElementById('playerFrame').addEventListener('load', () => {
            setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 200);
        });

        document.addEventListener('DOMContentLoaded', loadChannel);
    </script>
</body>
</html>

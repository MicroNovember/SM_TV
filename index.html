<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM-DADDY TV</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .channel-card {
            transition: all 0.25s ease;
            cursor: pointer;
            width: 120px;
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0.75rem;
            position: relative;
            overflow: hidden;
        }
        /* เอฟเฟกต์ไฮไลท์เมื่อชี้เมาส์ */
        .channel-card:hover {
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 12px 30px rgba(251, 146, 60, 0.25);
            border-color: #fb923c !important;
            background-color: rgba(251, 146, 60, 0.08) !important;
        }
        /* ไฮไลท์ชื่อช่องและไอคอนตอนชี้ */
        .channel-card:hover h3 {
            color: #fdba74 !important;
            font-weight: 600;
        }
        .channel-card:hover .tv-icon {
            color: #fdba74 !important;
            transform: scale(1.15);
        }
        /* เพิ่มแสงเรืองรองขอบ */
        .channel-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(251, 146, 60, 0.15), transparent);
            transition: left 0.4s ease;
        }
        .channel-card:hover::before {
            left: 100%;
        }
        .category-section {
            margin-bottom: 2.5rem;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e5e7eb;
        }
        .main-container {
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(251, 146, 60, 0.1);
        }
        .tab-btn {
            transition: all 0.2s ease;
            border-bottom: 3px solid transparent;
            color: #9ca3af;
        }
        .tab-btn.active {
            border-bottom-color: #fb923c;
            color: #fdba74;
            font-weight: 600;
        }
        .tab-btn:hover:not(.active) {
            background-color: rgba(251, 146, 60, 0.08);
            color: #e5e7eb;
        }
        input::placeholder {
            color: #6b7280 !important;
        }
    </style>
</head>
<body class="font-sans">
    <!-- Header -->
    <header class="bg-gradient-to-r from-gray-800 to-gray-900 text-white shadow-lg border-b border-orange-900/30">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-tv text-2xl text-orange-400"></i>
                    <h1 class="text-2xl font-bold">SM-DADDY TV - ควรใช้ Brave Browser</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="refreshChannels()" class="bg-orange-500 text-white px-4 py-2 rounded-lg hover:bg-orange-400 transition">
                        <i class="fas fa-sync-alt mr-2"></i>รีเฟรช
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Search Bar -->
    <div class="sticky top-0 z-40 bg-gray-900 bg-opacity-95 shadow-md border-b border-orange-900/20">
        <div class="container mx-auto px-4 py-3">
            <div class="max-w-2xl mx-auto">
                <div class="relative">
                    <input 
                        type="text" 
                        id="searchInput"
                        placeholder="ค้นหาช่องทีวี... (พิมพ์อย่างน้อย 2 ตัวอักษร)"
                        class="w-full px-4 py-3 pl-12 pr-20 text-gray-100 bg-gray-800 border-2 border-orange-900/40 rounded-full focus:outline-none focus:border-orange-500"
                    >
                    <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-orange-400"></i>
                    <div class="absolute right-2 top-1/2 transform -translate-y-1/2">
                        <span id="searchStatus" class="text-xs text-gray-400 mr-2">พิมพ์ 2+ ตัวอักษร</span>
                        <button 
                            onclick="clearSearch()" 
                            class="text-orange-400 hover:text-orange-300 px-2 py-1 rounded-full hover:bg-orange-900/30"
                            title="ล้างการค้นหา"
                        >
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <div class="main-container rounded-2xl shadow-2xl p-6">
            
            <div id="loadingState" class="text-center py-12">
                <i class="fas fa-spinner fa-spin text-4xl text-orange-400 mb-4"></i>
                <p class="text-gray-300">กำลังโหลดข้อมูลช่องทีวี...</p>
            </div>

            <div id="content" style="display: none;">
                <div id="categoryTabs" class="flex flex-wrap gap-2 mb-8 border-b border-gray-700 pb-2"></div>
                <div id="channelsContainer"></div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-300 py-6 mt-12 border-t border-orange-900/20">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-400">
                <i class="fas fa-info-circle mr-2 text-orange-400"></i>
                รวมช่องทีวีออนไลน์จากทั่วโลก - ดูฟรี 24/7
            </p>
        </div>
    </footer>

    <script>
        let allChannels = [];
        let searchTimeout;
        let currentCategory = 'ทั้งหมด';

        async function loadChannels() {
            try {
                const res = await fetch('channels.json');
                allChannels = await res.json();
                buildCategoryTabs();
                filterAndDisplay();
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch {
                document.getElementById('loadingState').innerHTML = `
                    <div class="text-orange-400">
                        <i class="fas fa-exclamation-triangle text-4xl mb-4"></i>
                        <p>ไม่สามารถโหลดข้อมูลช่องทีวีได้</p>
                    </div>
                `;
            }
        }

        function buildCategoryTabs() {
            const categories = ['ทั้งหมด', 'กีฬา', 'ข่าว', 'ภาพยนตร์', 'การ์ตูน', 'ทั่วไป'];
            document.getElementById('categoryTabs').innerHTML = categories.map(cat => `
                <button 
                    class="tab-btn px-4 py-2 rounded-t-lg font-medium ${cat === currentCategory ? 'active' : ''}"
                    onclick="switchCategory('${cat}')"
                >
                    ${getCategoryIcon(cat)} ${cat}
                </button>
            `).join('');
        }

        function switchCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.trim().includes(category));
            });
            filterAndDisplay();
        }

        function filterAndDisplay() {
            const q = document.getElementById('searchInput').value.trim().toLowerCase();
            let list = [...allChannels];

            if (q.length >= 2) {
                list = list.filter(c => c.name.toLowerCase().includes(q));
            }

            if (currentCategory !== 'ทั้งหมด') {
                const map = categorizeChannels(list);
                list = map[currentCategory] || [];
            }

            displayChannels(list, q);
        }

        function categorizeChannels(list) {
            const map = {};
            list.forEach(c => {
                let type = 'ทั่วไป';
                const n = c.name.toLowerCase();
                if (/sport|espn|fox sport|bein|arena sport/.test(n)) type = 'กีฬา';
                else if (/news|bbc|cnn|cnbc/.test(n)) type = 'ข่าว';
                else if (/movie|hbo|cinemax|axn/.test(n)) type = 'ภาพยนตร์';
                else if (/cartoon|disney|nickelodeon|boomerang/.test(n)) type = 'การ์ตูน';
                if (!map[type]) map[type] = [];
                map[type].push(c);
            });
            return map;
        }

        function getCategoryIcon(cat) {
            const icons = {
                'ทั้งหมด': '<i class="fas fa-layer-group mr-2 text-orange-400"></i>',
                'กีฬา': '<i class="fas fa-football-ball mr-2 text-green-400"></i>',
                'ข่าว': '<i class="fas fa-newspaper mr-2 text-blue-400"></i>',
                'ภาพยนตร์': '<i class="fas fa-film mr-2 text-red-400"></i>',
                'การ์ตูน': '<i class="fas fa-child mr-2 text-yellow-400"></i>',
                'ทั่วไป': '<i class="fas fa-tv mr-2 text-orange-400"></i>'
            };
            return icons[cat] || icons['ทั่วไป'];
        }

        function createChannelCard(c) {
            return `
                <div class="channel-card bg-gray-800 rounded-xl shadow-lg border-2 border-gray-700"
                     onclick="window.location.href='clean-player.html?id=${c.id}'">
                    <i class="fas fa-tv tv-icon text-orange-400 text-2xl mb-2 transition-all duration-200"></i>
                    <h3 class="font-medium text-gray-100 text-sm leading-tight line-clamp-3 transition-all duration-200">${c.name}</h3>
                </div>
            `;
        }

        function displayChannels(list, q = '') {
            const container = document.getElementById('channelsContainer');
            let html = '';

            if (q) {
                html += `
                    <div class="mb-6">
                        <h2 class="text-2xl font-bold text-gray-100">
                            <i class="fas fa-search mr-2 text-orange-400"></i>ผลการค้นหา: "${q}"
                        </h2>
                        <p class="text-gray-400 mt-1">พบ ${list.length} ช่อง</p>
                    </div>
                `;
            }

            if (currentCategory === 'ทั้งหมด' && !q) {
                const map = categorizeChannels(list);
                for (const [cat, items] of Object.entries(map)) {
                    if (!items.length) continue;
                    html += `
                        <div class="category-section">
                            <h2 class="text-2xl font-bold mb-6 text-gray-100 flex items-center">
                                ${getCategoryIcon(cat)}${cat} (${items.length})
                            </h2>
                            <div class="flex flex-wrap justify-center gap-3">
                                ${items.map(c => createChannelCard(c)).join('')}
                            </div>
                        </div>
                    `;
                }
            } else {
                if (list.length) {
                    html += `
                        <div class="category-section">
                            <h2 class="text-2xl font-bold mb-6 text-gray-100 flex items-center">
                                ${getCategoryIcon(currentCategory)}${currentCategory} (${list.length})
                            </h2>
                            <div class="flex flex-wrap justify-center gap-3">
                                ${list.map(c => createChannelCard(c)).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    html = `
                        <div class="text-center py-12 text-gray-400">
                            <i class="fas fa-search-minus text-4xl mb-3 text-orange-400/60"></i>
                            <p>ไม่พบช่องทีวีที่ตรงกับเงื่อนไข</p>
                        </div>
                    `;
                }
            }

            container.innerHTML = html;
        }

        function searchChannels() {
            clearTimeout(searchTimeout);
            const q = document.getElementById('searchInput').value.trim();
            const st = document.getElementById('searchStatus');

            if (!q.length) {
                st.textContent = 'พิมพ์ 2+ ตัวอักษร';
                st.className = 'text-xs text-gray-400 mr-2';
            } else if (q.length === 1) {
                st.textContent = 'ต้องการอีก 1 ตัวอักษร';
                st.className = 'text-xs text-yellow-400 mr-2';
            } else {
                st.textContent = 'กำลังค้นหา...';
                st.className = 'text-xs text-orange-400 mr-2';
            }

            searchTimeout = setTimeout(() => {
                filterAndDisplay();
                st.textContent = q.length >= 2 ? `พบ ${document.querySelectorAll('.channel-card').length} ช่อง` : 'พิมพ์ 2+ ตัวอักษร';
                st.className = q.length >= 2 ? 'text-xs text-green-400 mr-2' : 'text-xs text-gray-400 mr-2';
            }, 500);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchStatus').textContent = 'พิมพ์ 2+ ตัวอักษร';
            document.getElementById('searchStatus').className = 'text-xs text-gray-400 mr-2';
            filterAndDisplay();
        }

        function refreshChannels() {
            location.reload();
        }

        document.addEventListener('DOMContentLoaded', loadChannels);
        document.getElementById('searchInput').addEventListener('input', searchChannels);
        document.getElementById('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const q = document.getElementById('searchInput').value.trim();
                q.length >= 2 || !q ? filterAndDisplay() : alert('พิมพ์อย่างน้อย 2 ตัวอักษร');
            }
        });
    </script>
</body>
</html>

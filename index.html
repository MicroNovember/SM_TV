<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Football World Cup 2026 (Clean Version)</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- mpegts.js สำหรับเล่นไฟล์ .ts ผ่าน HTML5 Media Source Extensions -->
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
        }
        .channel-list::-webkit-scrollbar {
            width: 6px;
        }
        .channel-list::-webkit-scrollbar-thumb {
            background-color: #1f2937;
            border-radius: 4px;
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col justify-between">

    <div>
        <!-- Header -->
        <header class="bg-gradient-to-r from-green-900 to-blue-900 border-b border-green-700/40 p-4 shadow-lg">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="text-2xl md:text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-green-400 flex items-center gap-2">
                    ⚽🏆 FIFA WORLD CUP 2026 IPTV
                </h1>
                <span class="bg-red-600 text-white text-xs font-bold px-2.5 py-1 rounded-full animate-pulse">LIVE</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- ฝั่งเครื่องเล่นวิดีโอ -->
            <div class="lg:col-span-2 flex flex-col gap-4">
                <div class="relative bg-black rounded-xl overflow-hidden aspect-video border border-gray-800 shadow-2xl">
                    <video id="videoPlayer" controls autoplay muted class="w-full h-full"></video>
                    <div id="loadingOverlay" class="absolute inset-0 flex items-center justify-center bg-black/80 text-xl font-semibold text-green-400 hidden">
                        🔄 กำลังโหลดช่องสัญญาณ...
                    </div>
                </div>
                <div class="bg-gray-900/50 border border-gray-800 p-4 rounded-xl">
                    <h2 id="currentChannelTitle" class="text-xl font-bold text-yellow-400">กรุณาเลือกช่องรายการ</h2>
                    <p class="text-sm text-gray-400 mt-1">หากสัญญาณกระตุก หรือโหลดไม่ขึ้น อาจเกิดจากผู้ให้บริการต้นทาง (IPTV Server)</p>
                </div>
            </div>

            <!-- ฝั่งรายชื่อช่อง -->
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 flex flex-col h-[400px] lg:h-auto max-h-[550px]">
                <h3 class="text-lg font-bold border-b border-gray-800 pb-2 mb-3 text-gray-300 flex items-center gap-2">
                    📺 รายชื่อช่องถ่ายทอดสด
                </h3>
                <div class="channel-list overflow-y-auto flex flex-col gap-2 flex-grow" id="playlistContainer">
                    <!-- รายชื่อช่องจะถูกใส่เข้ามาด้วย JavaScript -->
                </div>
            </div>
        </main>
    </div>

    <!-- สคริปต์ควบคุมการเล่นสตรีม -->
    <script>
        // ข้อมูลลิงก์สตรีม (ดึงมาจาก Array เดิม)
        const channels = [
            { id: 0, title: "FUSSBALLTV1 UHD 4K", url: "http://starhub.pro/live/farhat-3379/67897-913379/745269.ts" },
            { id: 1, title: "FUSSBALLTV1 4K", url: "http://starhub.pro/live/farhat-3379/67897-913379/742610.ts" },
            { id: 2, title: "beIN SPORT 1 MAX", url: "http://starhub.pro/live/farhat-3379/67897-913379/744523.ts" },
            { id: 3, title: "beIN SPORT 2 MAX", url: "http://starhub.pro/live/farhat-3379/67897-913379/744524.ts" },
            { id: 4, title: "beIN SPORT 5", url: "http://starhub.pro/live/farhat-3379/67897-913379/744527.ts" },
            { id: 5, title: "S Central (Link 1)", url: "http://rgkkw.live/live/1Aoen7elp5/IgMJ60tmAa/745149.ts" },
            { id: 6, title: "S Central (Link 2)", url: "http://rgkkw.live/live/1Aoen7elp5/IgMJ60tmAa/741566.ts" },
            { id: 7, title: "Tsport HD", url: "http://rgkkw.live/live/1Aoen7elp5/IgMJ60tmAa/130714.ts" }
        ];

        let mpegtsPlayer = null;
        const videoElement = document.getElementById('videoPlayer');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const currentChannelTitle = document.getElementById('currentChannelTitle');

        // ฟังก์ชันสร้างปุ่มเลือกช่อง
        function renderPlaylist() {
            const container = document.getElementById('playlistContainer');
            channels.forEach(channel => {
                const button = document.createElement('button');
                button.className = `channel-btn flex items-center justify-between p-3 rounded-lg bg-gray-800/60 hover:bg-green-600/30 text-left border border-gray-800 hover:border-green-500 transition-all text-sm font-medium cursor-pointer`;
                button.innerHTML = `
                    <span class="truncate">📺 ${channel.title}</span>
                    <span class="text-xs text-gray-500 bg-black/40 px-2 py-0.5 rounded uppercase font-mono">${channel.url.split('.').pop()}</span>
                `;
                button.onclick = () => playStream(channel);
                container.appendChild(button);
            });
        }

        // ฟังก์ชันสั่งเล่นวิดีโอ .ts
        function playStream(channel) {
            loadingOverlay.classList.remove('hidden');
            currentChannelTitle.innerText = `กำลังเล่น: ${channel.title}`;

            if (mpegtsPlayer) {
                mpegtsPlayer.unload();
                mpegtsPlayer.detachMediaElement();
                mpegtsPlayer.destroy();
                mpegtsPlayer = null;
            }

            if (mpegts.getFeatureList().mseLivePlayback) {
                mpegtsPlayer = mpegts.createPlayer({
                    type: 'mpegts',
                    isLive: true,
                    url: channel.url
                });
                mpegtsPlayer.attachMediaElement(videoElement);
                mpegtsPlayer.load();
                mpegtsPlayer.play().then(() => {
                    loadingOverlay.classList.add('hidden');
                }).catch(error => {
                    console.error("Playback error:", error);
                    loadingOverlay.classList.add('hidden');
                    alert("ไม่สามารถเล่นช่องนี้ได้ในขณะนี้ สัญญาณต้นทางอาจจะปลิวไปแล้วครับ");
                });
            } else {
                alert("เบราว์เซอร์ของคุณไม่รองรับการถอดรหัส mpegts");
                loadingOverlay.classList.add('hidden');
            }
        }

        // โหลดหน้าเว็บเสร็จให้เล่นช่องแรกทันที
        window.onload = () => {
            renderPlaylist();
            if(channels.length > 0) {
                playStream(channels[0]);
            }
        };
    </script>
</body>
</html>

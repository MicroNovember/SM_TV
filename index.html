<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Channels - ดูทีวีออนไลน์ฟรี</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .channel-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .channel-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(251, 146, 60, 0.15);
        }
        .category-section {
            margin-bottom: 3rem;
        }
        .search-box {
            backdrop-filter: blur(10px);
            background: rgba(17, 24, 39, 0.9);
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e5e7eb;
        }
        .main-container {
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(251, 146, 60, 0.1);
        }
        /* สไตล์แท็บ */
        .tab-btn {
            transition: all 0.2s ease;
            border-bottom: 3px solid transparent;
            color: #9ca3af;
        }
        .tab-btn.active {
            border-bottom-color: #fb923c;
            color: #fdba74;
            font-weight: 600;
        }
        .tab-btn:hover:not(.active) {
            background-color: rgba(251, 146, 60, 0.08);
            color: #e5e7eb;
        }
        /* ปรับสีข้อความใน input */
        input::placeholder {
            color: #6b7280 !important;
        }
    </style>
</head>
<body class="font-sans">
    <!-- Header -->
    <header class="bg-gradient-to-r from-gray-800 to-gray-900 text-white shadow-lg border-b border-orange-900/30">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-tv text-2xl text-orange-400"></i>
                    <h1 class="text-2xl font-bold">Live TV Channels</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="refreshChannels()" class="bg-orange-500 text-white px-4 py-2 rounded-lg hover:bg-orange-400 transition">
                        <i class="fas fa-sync-alt mr-2"></i>รีเฟรช
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Search Bar -->
    <div class="sticky top-0 z-40 bg-gray-900 bg-opacity-95 shadow-md border-b border-orange-900/20">
        <div class="container mx-auto px-4 py-3">
            <div class="max-w-2xl mx-auto">
                <div class="relative">
                    <input 
                        type="text" 
                        id="searchInput"
                        placeholder="ค้นหาช่องทีวี... (พิมพ์อย่างน้อย 2 ตัวอักษร)"
                        class="w-full px-4 py-3 pl-12 pr-20 text-gray-100 bg-gray-800 border-2 border-orange-900/40 rounded-full focus:outline-none focus:border-orange-500"
                        onkeyup="searchChannels()"
                    >
                    <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-orange-400"></i>
                    <div class="absolute right-2 top-1/2 transform -translate-y-1/2">
                        <span id="searchStatus" class="text-xs text-gray-400 mr-2">พิมพ์ 2+ ตัวอักษร</span>
                        <button 
                            onclick="clearSearch()" 
                            class="text-orange-400 hover:text-orange-300 px-2 py-1 rounded-full hover:bg-orange-900/30"
                            title="ล้างการค้นหา"
                        >
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <div class="main-container rounded-2xl shadow-2xl p-8">
            
            <div id="loadingState" class="text-center py-12">
                <i class="fas fa-spinner fa-spin text-4xl text-orange-400 mb-4"></i>
                <p class="text-gray-300">กำลังโหลดข้อมูลช่องทีวี...</p>
            </div>

            <div id="content" style="display: none;">
                <!-- แถบแท็บหมวดหมู่ -->
                <div id="categoryTabs" class="flex flex-wrap gap-2 mb-8 border-b border-gray-700 pb-2">
                    <!-- แท็บจะถูกสร้างด้วย JavaScript -->
                </div>

                <!-- พื้นที่แสดงผลช่อง -->
                <div id="channelsContainer"></div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-300 py-6 mt-12 border-t border-orange-900/20">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-400">
                <i class="fas fa-info-circle mr-2 text-orange-400"></i>
                รวมช่องทีวีออนไลน์จากทั่วโลก - ดูฟรี 24/7
            </p>
        </div>
    </footer>

    <script>
        let allChannels = [];
        let searchTimeout;
        let currentCategory = 'ทั้งหมด'; // หมวดหมู่ที่เลือกปัจจุบัน

        // โหลดข้อมูลช่อง
        async function loadChannels() {
            try {
                const response = await fetch('static/data/channels.json');
                allChannels = await response.json();
                // สร้างแท็บและแสดงผลครั้งแรก
                buildCategoryTabs();
                filterAndDisplay();
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (error) {
                console.error('Error loading channels:', error);
                document.getElementById('loadingState').innerHTML = `
                    <div class="text-orange-400">
                        <i class="fas fa-exclamation-triangle text-4xl mb-4"></i>
                        <p>ไม่สามารถโหลดข้อมูลช่องทีวีได้</p>
                    </div>
                `;
            }
        }

        // สร้างแถบแท็บหมวดหมู่
        function buildCategoryTabs() {
            const categories = ['ทั้งหมด', 'กีฬา', 'ข่าว', 'ภาพยนตร์', 'การ์ตูน', 'ทั่วไป'];
            const tabsContainer = document.getElementById('categoryTabs');
            
            tabsContainer.innerHTML = categories.map(cat => `
                <button 
                    class="tab-btn px-4 py-2 rounded-t-lg font-medium ${cat === currentCategory ? 'active' : ''}"
                    onclick="switchCategory('${cat}')"
                >
                    ${getCategoryIcon(cat)} ${cat}
                </button>
            `).join('');
        }

        // สลับหมวดหมู่
        function switchCategory(category) {
            currentCategory = category;
            // อัปเดตสถานะแท็บ
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.trim().includes(category)) btn.classList.add('active');
            });
            // กรองและแสดงผล
            filterAndDisplay();
        }

        // กรองข้อมูลตามหมวดหมู่และคำค้นหา
        function filterAndDisplay() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            let filtered = [...allChannels];

            // กรองตามคำค้นหา
            if (query.length >= 2) {
                filtered = filtered.filter(ch => ch.name.toLowerCase().includes(query));
            }

            // กรองตามหมวดหมู่ (ถ้าไม่ใช่ "ทั้งหมด")
            if (currentCategory !== 'ทั้งหมด') {
                const categorized = categorizeChannels(filtered);
                filtered = categorized[currentCategory] || [];
            }

            displayChannels(filtered, query);
        }

        // แบ่งหมวดหมู่ช่อง
        function categorizeChannels(channels) {
            const categories = {};
            for (const channel of channels) {
                let category = 'ทั่วไป';
                const name = channel.name.toLowerCase();
                
                if (anyWordInString(name, ['sport', 'espn', 'fox sport', 'bein', 'arena sport'])) {
                    category = 'กีฬา';
                } else if (anyWordInString(name, ['news', 'bbc', 'cnn', 'cnbc'])) {
                    category = 'ข่าว';
                } else if (anyWordInString(name, ['movie', 'hbo', 'cinemax', 'axn'])) {
                    category = 'ภาพยนตร์';
                } else if (anyWordInString(name, ['cartoon', 'disney', 'nickelodeon', 'boomerang'])) {
                    category = 'การ์ตูน';
                }
                
                if (!categories[category]) {
                    categories[category] = [];
                }
                categories[category].push(channel);
            }
            return categories;
        }

        function anyWordInString(str, words) {
            return words.some(word => str.includes(word));
        }

        // แสดงช่องทีวี
        function displayChannels(channels, searchQuery = '') {
            const container = document.getElementById('channelsContainer');
            const categorized = categorizeChannels(channels);
            
            let html = '';
            
            if (searchQuery) {
                html = `
                    <div class="mb-6">
                        <h2 class="text-2xl font-bold text-gray-100">
                            <i class="fas fa-search mr-2 text-orange-400"></i>
                            ผลการค้นหา: "${searchQuery}"
                        </h2>
                        <p class="text-gray-400 mt-1">พบ ${channels.length} ช่อง</p>
                    </div>
                `;
            } else if (currentCategory === 'ทั้งหมด') {
                // แสดงแยกหมวดหมู่เมื่อเลือกดูทั้งหมด
                for (const [category, catChannels] of Object.entries(categorized)) {
                    if (catChannels.length === 0) continue;
                    
                    html += `
                        <div class="category-section">
                            <h2 class="text-2xl font-bold mb-6 text-gray-100 flex items-center">
                                ${getCategoryIcon(category)}
                                ${category} (${catChannels.length})
                            </h2>
                            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                    `;
                    
                    catChannels.forEach(channel => html += createChannelCard(channel));
                    html += '</div></div>';
                }
            } else {
                // แสดงเฉพาะหมวดหมู่ที่เลือก
                html += `
                    <div class="category-section">
                        <h2 class="text-2xl font-bold mb-6 text-gray-100 flex items-center">
                            ${getCategoryIcon(currentCategory)}
                            ${currentCategory} (${channels.length})
                        </h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                `;
                channels.forEach(channel => html += createChannelCard(channel));
                html += '</div></div>';
            }
            
            container.innerHTML = html || `
                <div class="text-center py-12 text-gray-400">
                    <i class="fas fa-search-minus text-4xl mb-3 text-orange-400/60"></i>
                    <p>ไม่พบช่องทีวีที่ตรงกับเงื่อนไข</p>
                </div>
            `;
        }

        function getCategoryIcon(category) {
            const icons = {
                'ทั้งหมด': '<i class="fas fa-layer-group mr-2 text-orange-400"></i>',
                'กีฬา': '<i class="fas fa-football-ball mr-2 text-green-400"></i>',
                'ข่าว': '<i class="fas fa-newspaper mr-2 text-blue-400"></i>',
                'ภาพยนตร์': '<i class="fas fa-film mr-2 text-red-400"></i>',
                'การ์ตูน': '<i class="fas fa-child mr-2 text-yellow-400"></i>',
                'ทั่วไป': '<i class="fas fa-tv mr-2 text-orange-400"></i>'
            };
            return icons[category] || icons['ทั่วไป'];
        }

        function createChannelCard(channel) {
            return `
                <div class="channel-card bg-gray-800 rounded-xl shadow-lg overflow-hidden border-2 border-gray-700 hover:border-orange-400/70">
                    <div class="bg-gradient-to-r from-orange-600/90 to-amber-600/90 h-20 flex items-center justify-center">
                        <i class="fas fa-tv text-white text-3xl"></i>
                    </div>
                    <div class="p-4">
                        <h3 class="font-semibold text-gray-100 text-sm mb-1 line-clamp-2">${channel.name}</h3>
                        <p class="text-xs text-gray-400">ID: ${channel.id}</p>
                        <div class="mt-2 space-y-1">
                            <span class="inline-block bg-orange-900/40 text-orange-300 text-xs px-2 py-1 rounded-full">
                                <i class="fas fa-play mr-1"></i>ดูออนไลน์
                            </span>
                            <div class="flex gap-1">
                                <a href="player.html?id=${channel.id}" class="inline-block bg-blue-900/40 text-blue-300 text-xs px-2 py-1 rounded-full hover:bg-blue-900/70">
                                    <i class="fas fa-tv mr-1"></i>Player
                                </a>
                                <a href="clean-player.html?id=${channel.id}" class="inline-block bg-green-900/40 text-green-300 text-xs px-2 py-1 rounded-full hover:bg-green-900/70">
                                    <i class="fas fa-shield-alt mr-1"></i>Clean
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ฟังก์ชันค้นหา
        function searchChannels() {
            clearTimeout(searchTimeout);
            const query = document.getElementById('searchInput').value.trim();
            const status = document.getElementById('searchStatus');
            
            if (query.length === 0) {
                status.textContent = 'พิมพ์ 2+ ตัวอักษร';
                status.className = 'text-xs text-gray-400 mr-2';
            } else if (query.length === 1) {
                status.textContent = 'ต้องการอีก 1 ตัวอักษร';
                status.className = 'text-xs text-yellow-400 mr-2';
            } else {
                status.textContent = 'กำลังค้นหา...';
                status.className = 'text-xs text-orange-400 mr-2';
            }
            
            searchTimeout = setTimeout(() => {
                filterAndDisplay();
                if (query.length >= 2) {
                    const count = document.querySelectorAll('.channel-card').length;
                    status.textContent = `พบ ${count} ช่อง`;
                    status.className = 'text-xs text-green-400 mr-2';
                } else {
                    status.textContent = 'พิมพ์ 2+ ตัวอักษร';
                    status.className = 'text-xs text-gray-400 mr-2';
                }
            }, 500);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchStatus').textContent = 'พิมพ์ 2+ ตัวอักษร';
            document.getElementById('searchStatus').className = 'text-xs text-gray-400 mr-2';
            filterAndDisplay();
        }

        function refreshChannels() {
            location.reload();
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', loadChannels);
        
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const query = this.value.trim();
                if (query.length >= 2) {
                    filterAndDisplay();
                } else if (query.length === 0) {
                    filterAndDisplay();
                } else {
                    alert('กรุณาพิมพ์อย่างน้อย 2 ตัวอักษรเพื่อค้นหา');
                }
            }
        });
    </script>
</body>
</html>
